services:
  searxng:
    image: searxng/searxng
    container_name: searxng
    ports:
      - "8080:8080"
    volumes:
      - ./docker/searxng/settings.yml:/etc/searxng/settings.yml
    environment:
      - BASE_URL=http://localhost:8080/
    restart: unless-stopped
    networks:
      - supplier_net

  postgres:
    image: postgres:16
    container_name: suppliersearchagent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: suppliersearchagentdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d suppliersearchagentdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - supplier_net

  pgadmin:
    image: dpage/pgadmin4
    container_name: suppliersearchagent-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - supplier_net

volumes:
  postgres_data:

networks:
  supplier_net:
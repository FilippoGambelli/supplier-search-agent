services:
  searxng:
    image: searxng/searxng
    ports:
      - "8080:8080"
    volumes:
      - ../docker/searxng/settings.yml:/etc/searxng/settings.yml
    environment:
      BASE_URL: http://searxng:8080/
    networks:
      - supplier_net

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: suppliersearchagentdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../docker/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d suppliersearchagentdb"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - supplier_net

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - supplier_net
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SEARXNG_URL: http://searxng:8080
      DATABASE_URL: postgresql+psycopg2://admin:admin@postgres:5432/suppliersearchagentdb
    networks:
      - supplier_net

volumes:
  postgres_data:
    name: ssa_postgres_data

networks:
  supplier_net:
    name: ssa_supplier_net
